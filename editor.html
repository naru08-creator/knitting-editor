<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>編み図エディタ</title>
  <link rel="stylesheet" href="style.css?v=20260405-19">
</head>
<body>
  <div id="file-toolbar">
    <button id="homeBtn" class="ur-btn">トップへ戻る</button>
    <button id="openBtn" class="ur-btn">開く</button>
    <button id="saveBtn" class="ur-btn">JSON書き出し</button>
    <button id="pngBtn" class="ur-btn">画像保存</button>
    <button id="printBtn" class="ur-btn">印刷 / PDF保存</button>
    <button id="settingsBtn" class="ur-btn icon-btn" type="button" aria-label="記号メニュー設定" aria-expanded="false">⚙</button>
  </div>

  <div id="editor-toolbar">
    <label class="toolbar-field">目数 <input id="cols" type="number" value="20"></label>
    <label class="toolbar-field">段数 <input id="rows" type="number" value="20"></label>
    <button id="makeGrid" class="ur-btn primary-action">グリッドを作る</button>
    <button id="undoBtn" class="ur-btn">戻す</button>
    <button id="redoBtn" class="ur-btn">やり直す</button>
    <button id="eraserBtn" class="ur-btn eraser">消しゴム</button>
    <button id="touchPatternBtn" class="ur-btn touch-only" type="button">複製モード</button>
    <button id="shapeModeBtn" class="ur-btn">形編集</button>
    <input id="openFileInput" type="file" accept="application/json,.json" hidden>
  </div>

  <div id="shapeControls" hidden>
    <button id="shapeDisableBtn" class="shape-btn active" type="button">無効化</button>
    <button id="shapeEnableBtn" class="shape-btn" type="button">有効化</button>
    <button id="shapeUndoBtn" class="shape-btn secondary" type="button">形を戻す</button>
    <button id="shapeRedoBtn" class="shape-btn secondary" type="button">形をやり直す</button>
    <label class="shape-toggle">
      <input id="shapeMirrorToggle" type="checkbox">
      左右対称
    </label>
  </div>

  <div id="settingsPanel" hidden>
    <label for="palettePositionSelect">記号メニューの位置</label>
    <select id="palettePositionSelect">
      <option value="auto">自動</option>
      <option value="top">上</option>
      <option value="bottom">下</option>
      <option value="left">左</option>
      <option value="right">右</option>
    </select>
    <p id="palettePositionHint">自動では、縦向きは下、横向きは右に表示します。</p>
  </div>

  <div id="editor-layout">
    <section id="grid-workspace">
      <div id="grid-viewport-toolbar">
        <span id="gridZoomLabel">表示 100%</span>
        <div id="grid-zoom-buttons">
          <button id="zoomOutBtn" class="ur-btn zoom-btn" type="button">縮小</button>
          <button id="zoomResetBtn" class="ur-btn zoom-btn" type="button">100%</button>
          <button id="zoomInBtn" class="ur-btn zoom-btn" type="button">拡大</button>
        </div>
      </div>

      <div id="grid-viewport">
        <div id="grid-stage">
          <div id="grid-wrapper">
            <div id="grid-area">
              <div id="grid-shell">
                <div id="grid-cells"></div>
                <div id="grid-overlay"></div>
                <div id="pattern-preview-layer"></div>
                <div id="pattern-selection-box" hidden></div>
              </div>
              <div id="rowNumbers"></div>
            </div>
            <div id="colNumbers"></div>
          </div>
        </div>
      </div>
    </section>

    <aside id="palette-dock" aria-label="記号メニュー">
      <div class="palette-group">
        <button class="toggle-btn" data-target="palette-1">1マス</button>
        <div id="palette-1" class="palette-content"></div>
      </div>

      <div class="palette-group">
        <button class="toggle-btn" data-target="palette-w2">幅2マス</button>
        <div id="palette-w2" class="palette-content"></div>
      </div>

      <div class="palette-group">
        <button class="toggle-btn" data-target="palette-w3">幅3マス</button>
        <div id="palette-w3" class="palette-content"></div>
      </div>

      <div class="palette-group">
        <button class="toggle-btn" data-target="palette-w4">幅4マス</button>
        <div id="palette-w4" class="palette-content"></div>
      </div>

      <div class="palette-group">
        <button class="toggle-btn" data-target="palette-h2">高さ2マス</button>
        <div id="palette-h2" class="palette-content"></div>
      </div>

      <div class="palette-group">
        <button class="toggle-btn" data-target="palette-h3">高さ3マス</button>
        <div id="palette-h3" class="palette-content"></div>
      </div>
    </aside>
  </div>

  <div id="printArea" aria-hidden="true"></div>

  <script src="data/symbols.js?v=20260404-3"></script>
  <script src="editor.js?v=20260405-18"></script>
</body>
</html>
